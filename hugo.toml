baseURL = 'https://doct2r.github.io/'
languageCode = 'ko'
title = 'My Blog'
theme = 'PaperMod'
[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = 'production'
  title = 'My Blog'
  description = ''
  keywords = []
  author = 'Me'
  dateFormat = '2006-01-02'
  defaultTheme = 'auto'  # dark, light, auto
  disableThemeToggle = false

  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "안녕하세요 \U0001F44B"
    Content = '블로그에 오신 것을 환영합니다'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/'

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = 'Search'
    url = '/search/'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']
