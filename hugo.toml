baseURL = 'https://doct2r.github.io/'
languageCode = 'ko'
title = "Doct2r's Blog"
theme = 'CleanWhite'
hasCJKLanguage = true

[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  header_image    = ""
  SEOTitle        = "Doct2r's Blog"
  description     = "개발과 기술에 관한 이야기"
  keyword         = "개발, 프로그래밍, AI, 운영체제, 하드웨어, Claude"
  slogan          = ""

  sidebar_about_description = "소프트웨어 개발자"

  featured_tags           = true
  featured_condition_size = 0

  algolia_search    = false
  page_view_counter = false

  omit_categories = false
  friends         = false
  bookmarks       = false
  about_me        = true
  last_posts      = true

  custom_css = ["css/custom.css"]

  [[params.additional_menus]]
    title = "ARCHIVE"
    href  = "/archive"

  [[params.additional_menus]]
    title = "ABOUT"
    href  = "/about"

  [params.social]
    rss    = true
    github = "https://github.com/Doct2r"

[taxonomies]
  category = 'categories'
  tag      = 'tags'

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.highlight]
    style = "dracula"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
